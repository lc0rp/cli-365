name: daemon-e2e-smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deterministic-daemon-e2e:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run internal daemon tests
        env:
          GOCACHE: ${{ runner.temp }}/gocache
          TMPDIR: /tmp
        run: |
          set -euo pipefail
          mkdir -p .tmp/ci
          go test ./internal/daemon -count=1 | tee .tmp/ci/internal-daemon.log

      - name: Run daemon deterministic parity/e2e smoke tests
        env:
          GOCACHE: ${{ runner.temp }}/gocache
          TMPDIR: /tmp
        run: |
          set -euo pipefail
          mkdir -p .tmp/ci
          go test ./cmd/cli-365 -count=1 -run 'TestDaemonAutoStartAndReuseIntegration|TestDaemonInProcessDispatchParity|TestDaemonInProcessDispatchParityAuthStatusWithCachedTokens' | tee .tmp/ci/cli-daemon-smoke.log

      - name: Publish daemon smoke summary
        if: always()
        run: |
          {
            echo "### Daemon smoke summary (${{ matrix.os }})"
            echo
            echo "- internal/daemon:"
            grep -E '^ok\s+github.com/lc0rp/cli-365/internal/daemon' .tmp/ci/internal-daemon.log || true
            echo "- cmd/cli-365 deterministic smoke:"
            grep -E '^ok\s+github.com/lc0rp/cli-365/cmd/cli-365' .tmp/ci/cli-daemon-smoke.log || true
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload daemon smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daemon-smoke-logs-${{ matrix.os }}
          path: .tmp/ci/*.log
          if-no-files-found: warn
