name: daemon-e2e-smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deterministic-daemon-e2e:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run daemon deterministic parity/e2e smoke tests
        env:
          GOCACHE: ${{ runner.temp }}/gocache
        run: |
          go test ./internal/daemon -count=1
          go test ./cmd/cli-365 -count=1 -run 'TestDaemonAutoStartAndReuseIntegration|TestDaemonInProcessDispatchParity|TestDaemonInProcessDispatchParityAuthStatusWithCachedTokens'
